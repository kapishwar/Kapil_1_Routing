
<mat-card>
    <h2>
        📦 {{isInEditMode ? 'Update Product' : 'Add Products'}}
    </h2>

    <form [formGroup]="ProductForm" (ngSubmit)="OnSubmitProduct()">
        <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" formControlName="name" class="form-control" title="name">
            <div class="text-danger" *ngIf="control['name'].touched && control['name'].hasError('required')">
                Product Name is required 
            </div>
        </div>

        <div class="form-group">
            <label for="category">Product Category</label>
            <select name="category" id="category" class="form-control" formControlName="category">
                <option value="">Select Category</option>
                <option value="Mobile">Mobile</option>
                <option value="Laptop">Laptop</option>
                <option value="Accessories">Accessories</option>
                <option value="Wearable">Wearable</option>
            </select>

            <div class="text-danger" *ngIf="control['category'].touched && control['category'].hasError('required')">
                Product Category is required 
            </div>
        </div>


        <div class="form-group">
            <label for="price"> Product price</label>
            <input type="number" title="price" formControlName="price" class="form-control">

            <div class="text-danger" *ngIf="control['price'].touched && control['price'].hasError('required')">
                Product Price is required 
            </div>
        </div>


        <div class="form-group">
            <label for="stock"> Product Stock</label>
            <input type="number" title="stock" formControlName="stock" class="form-control">

            <div class="text-danger" *ngIf="control['stock'].touched && control['stock'].hasError('required')">
                Product Stock is required 
            </div>
        </div>


        <div class="form-group">
            <label for="rating">Product Rating</label>
            <select name="rating" id="rating" class="form-control"  formControlName="rating">
                <option value="">Select Rating</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <div class="text-danger" *ngIf="control['rating'].touched && control['rating'].hasError('required')">
                Product rating is required 
            </div>
        </div>


        <div class="form-group">
            <label for="image">Img URL</label>
            <input type="url" title="image" class="form-control" formControlName="image">

            <div class="text-danger" *ngIf="control['image'].touched && control['image'].hasError('required')">
                Product Img URL is required 
            </div>

            <div class="text-danger" *ngIf="control['image'].dirty && control['image'].hasError('pattern')">
                Invalid Img URL
            </div>
        </div>




        <button mat-raised-button color="primary" class="w-100" *ngIf="!isInEditMode">Add Product</button>
    </form>
    <button (click)="OnUpdateProduct()" mat-raised-button color="warn" class="w-100" *ngIf="isInEditMode">Update Product</button>
</mat-card>
